<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/wave.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Ocean Simulation</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
      /* ── MOBILE CONTROLS ─────────────────────────────────────────────── */
      #mobile-controls {
        position: fixed;
        bottom: 30px;
        left: 20px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        opacity: 0.45;
        transition: opacity 0.2s;
      }
      #mobile-controls:active { opacity: 0.85; }

      /* Formation button — bottom-right corner */
      #formation-control {
        position: fixed;
        bottom: 30px;
        right: 20px;
        z-index: 100;
        opacity: 0.45;
        transition: opacity 0.2s;
      }
      #formation-control:active { opacity: 0.85; }

      /* Hide both on desktop */
      @media (min-width: 769px) {
        #mobile-controls  { display: none; }
        #formation-control { display: none; }
      }

      /* ── BUTTON STYLE (shared) ───────────────────────────────────────── */
      .ctrl-btn {
        width: 58px;
        height: 58px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: white;
        border-radius: 12px;
        font-size: 22px;
        display: flex;
        justify-content: center;
        align-items: center;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      /* Formation button slightly wider to fit label */
      #btn-formation {
        width: auto;
        min-width: 58px;
        padding: 0 12px;
        font-size: 13px;
        letter-spacing: 0.5px;
        flex-direction: column;
        gap: 2px;
        height: 62px;
      }

      .ctrl-row {
        display: flex;
        gap: 6px;
      }

      /* ── LANDSCAPE: keep controls in corners, increase gap so thumbs fit */
      @media (max-width: 768px) and (orientation: landscape) {
        #mobile-controls {
          bottom: 14px;
          left: 14px;
          gap: 4px;
        }
        #formation-control {
          bottom: 14px;
          right: 14px;
        }
        .ctrl-btn {
          width: 50px;
          height: 50px;
          font-size: 19px;
        }
        #btn-formation {
          height: 54px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="blocker">
      <div id="instructions">
        <p style="font-size:36px">Click to Simulate</p>
        <p>
          WASD / buttons to fly &nbsp;|&nbsp;
          Environment: Q / E<br/>
          Formation: <strong>Spacebar</strong> (or the V button on mobile)
        </p>
      </div>
    </div>

    <div id="app"></div>

    <!-- Left cluster: movement -->
    <div id="mobile-controls">
      <button class="ctrl-btn" id="btn-forward">▲</button>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-left">◀</button>
        <button class="ctrl-btn" id="btn-backward">▼</button>
        <button class="ctrl-btn" id="btn-right">▶</button>
      </div>
    </div>

    <!-- Right corner: formation toggle -->
    <div id="formation-control">
      <button class="ctrl-btn" id="btn-formation">
        <span style="font-size:18px">🐦‍🔥</span>
        <span>V</span>
      </button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
