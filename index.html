<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/wave.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ocean Simulation</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="blocker">
      <div id="instructions">
        <p style="font-size:36px">Click to Simulate</p>
        <p>WASD to move | Mouse to look | Environment: Q / E<br/></p>
      </div>
    </div>
    <div id="app"></div>    
    <div id="mobile-controls">
      <button id="btn-forward">▲</button>
      <div class="row">
        <button id="btn-left">◀</button>
        <button id="btn-backward">▼</button>
        <button id="btn-right">▶</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
