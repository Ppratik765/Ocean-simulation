<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/wave.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Ocean Simulation</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
      /* ── DETECT TOUCH DEVICES by capability, not width ──────────────────
         hover:none + pointer:coarse = touchscreen (phone/tablet).
         This correctly shows controls on phones in ANY orientation —
         portrait OR landscape — while hiding them on mouse desktops.        */

      #mobile-controls,
      #right-controls { display: none; }

      /* JS fallback for S Pen devices (Note 10 etc.) that misreport pointer
         as "fine" — JS detects maxTouchPoints > 0 and adds this class. */
      html.is-touch #mobile-controls,
      html.is-touch #right-controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: fixed;
        z-index: 100;
        gap: 6px;
        opacity: 0.5;
        transition: opacity 0.15s;
      }
      html.is-touch #mobile-controls          { bottom: 28px; left: 18px; }
      html.is-touch #right-controls           { bottom: 28px; right: 18px; }
      html.is-touch #mobile-controls:active,
      html.is-touch #right-controls:active    { opacity: 0.9; }

      @media (any-pointer: coarse) {
        /* ── LEFT: movement cluster ────────────────────────────────────── */
        #mobile-controls {
          display: flex;
          flex-direction: column;
          align-items: center;
          position: fixed;
          bottom: 28px;
          left: 18px;
          z-index: 100;
          gap: 6px;
          opacity: 0.5;
          transition: opacity 0.15s;
        }

        /* ── RIGHT: env + formation stacked ───────────────────────────── */
        #right-controls {
          display: flex;
          flex-direction: column;
          align-items: center;
          position: fixed;
          bottom: 28px;
          right: 18px;
          z-index: 100;
          gap: 6px;
          opacity: 0.5;
          transition: opacity 0.15s;
        }

        #mobile-controls:active,
        #right-controls:active { opacity: 0.9; }

        /* ── LANDSCAPE: tighter layout ─────────────────────────────────── */
        @media (orientation: landscape) {
          #mobile-controls  { bottom: 10px; left: 12px; gap: 4px; }
          #right-controls   { bottom: 10px; right: 12px; gap: 4px; }
          .ctrl-btn         { width: 48px !important; height: 48px !important; font-size: 18px !important; }
          .ctrl-btn-tall    { height: 52px !important; }
          .ctrl-btn .btn-label { font-size: 10px !important; }
        }
      }

      /* ── SHARED BUTTON STYLE ─────────────────────────────────────────── */
      .ctrl-btn {
        width: 56px;
        height: 56px;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.22);
        color: #fff;
        border-radius: 12px;
        font-size: 21px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2px;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }
      .ctrl-btn-tall { height: 62px; }
      .ctrl-btn .btn-icon  { font-size: 19px; line-height: 1; }
      .ctrl-btn .btn-label { font-size: 11px; opacity: 0.8; line-height: 1; }
      .ctrl-row { display: flex; gap: 6px; }
    </style>
  </head>
  <body>
    <div id="blocker">
      <div id="instructions">
        <p style="font-size:36px">Tap / Click to Fly</p>
        <div style="text-align: center;">
          <table style="width: 100%; max-width: 400px; text-align: left; margin: 0 auto;">
            <tr>
              <td style="padding: 8px 5px;"><kbd>W</kbd> ↑ / <kbd>S</kbd> ↓</td>
              <td style="padding: 8px 5px;">Climb / Dive</td>
            </tr>
            <tr>
              <td style="padding: 8px 5px;"><kbd>A</kbd> ← / <kbd>D</kbd> →</td>
              <td style="padding: 8px 5px;">Turn</td>
            </tr>
            <tr>
              <td style="padding: 8px 5px;"><kbd>Q</kbd> / <kbd>E</kbd></td>
              <td style="padding: 8px 5px;">Change Environment</td>
            </tr>
            <tr>
              <td style="padding: 8px 5px;"><kbd>Space</kbd></td>
              <td style="padding: 8px 5px;">Formation</td>
            </tr>
          </table>
        </div>
      </div>
    </div>

    <div id="app"></div>

    <!-- ── LEFT: movement ───────────────────────────────────────────────── -->
    <div id="mobile-controls">
      <button class="ctrl-btn" id="btn-forward">▲</button>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-left">◀</button>
        <button class="ctrl-btn" id="btn-backward">▼</button>
        <button class="ctrl-btn" id="btn-right">▶</button>
      </div>
    </div>

    <!-- ── RIGHT: env (top) + formation (bottom) ────────────────────────── -->
    <div id="right-controls">
      <button class="ctrl-btn ctrl-btn-tall" id="btn-env">
        <span class="btn-icon">🌅</span>
        <span class="btn-label">ENV</span>
      </button>
      <button class="ctrl-btn ctrl-btn-tall" id="btn-formation">
        <span class="btn-icon">🐦</span>
        <span class="btn-label">V</span>
      </button>
    </div>

    <script type="module" src="/src/main.js"></script>

    <script>
      // ── TOUCH BUTTON VISIBILITY — JS FALLBACK ───────────────────────────
      // CSS `any-pointer: coarse` is correct in theory but Samsung devices
      // with S Pen (Note 10, Tab S series, etc.) can report pointer: fine
      // to the browser even when only the touchscreen is in use, because the
      // hardware stylus is registered as a fine pointer input device.
      // This causes the CSS rule to never fire, hiding all touch buttons.
      //
      // Fix: if the device physically has touch points (maxTouchPoints > 0)
      // OR the legacy ontouchstart API exists, we force-show the controls
      // via a class on <html>, regardless of what CSS pointer queries report.
      // This is evaluated synchronously so there's no flash of hidden controls.
      (function () {
        const hasTouch = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
        if (hasTouch) document.documentElement.classList.add('is-touch');
      })();

      // ── AUTO-FULLSCREEN ON LANDSCAPE ────────────────────────────────────
      function tryFullscreen() {
        if (navigator.maxTouchPoints < 1) return;
        const landscape = window.innerWidth > window.innerHeight;
        if (landscape && !document.fullscreenElement) {
          const el = document.documentElement;
          const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
          fn?.call(el).catch(() => {});
        } else if (!landscape && document.fullscreenElement) {
          const fn = document.exitFullscreen || document.webkitExitFullscreen;
          fn?.call(document).catch(() => {});
        }
      }
      window.addEventListener('orientationchange', () => setTimeout(tryFullscreen, 200));
      window.addEventListener('resize', tryFullscreen);
    </script>
  </body>
</html>
